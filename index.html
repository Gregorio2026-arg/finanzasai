<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanzasAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080c15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanzasAI">
<style>
/* === TEMAS === */
[data-theme="dark"]{--bg0:#080c15;--bg1:#0e1422;--bg2:#141c2e;--bg3:#1a2438;--bg4:#222e46;--t1:#f0f4ff;--t2:#8fa3c8;--t3:#4a5a78;--t4:#1e2a40;--bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.11)}
[data-theme="light"]{--bg0:#f0f4f8;--bg1:#ffffff;--bg2:#f8fafc;--bg3:#e8edf4;--bg4:#d1dbe8;--t1:#1a2236;--t2:#3d5170;--t3:#7a8fa6;--t4:#b8c8d8;--bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.15)}
[data-theme="light"] .sidebar{background:#fff;border-right:1px solid rgba(0,0,0,.08)}
[data-theme="light"] .dp{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06)}
[data-theme="light"] .met{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06)}
[data-theme="light"] .ac{background:#fff}
[data-theme="light"] .topbar{background:#fff}
[data-theme="light"] .mo{background:#fff}
[data-theme="light"] table{color:var(--t1)}
[data-theme="light"] .acc2{color:var(--acc)}
[data-theme="gray"]{--bg0:#18191c;--bg1:#1e2023;--bg2:#26282d;--bg3:#2e3035;--bg4:#383b42;--t1:#e8e9ea;--t2:#9fa3aa;--t3:#5a5e66;--t4:#323536;--bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.1)}
[data-theme="crypto"]{--bg0:#03070f;--bg1:#060f1e;--bg2:#0a1830;--bg3:#0f2040;--bg4:#152850;--t1:#c8e8ff;--t2:#5a9fd4;--t3:#2a5070;--t4:#0a1828;--bdr:rgba(0,200,255,.07);--bdr2:rgba(0,200,255,.16);--acc:#00c8ff;--acc2:#005a99}
[data-theme="crypto"] .logo-icon{background:linear-gradient(135deg,#f7931a,#e8520a);box-shadow:0 3px 12px rgba(247,147,26,.5)}
[data-theme="crypto"] .ni.on{background:rgba(0,200,255,.08);color:#00c8ff;border-left-color:#00c8ff}
[data-theme="crypto"] .bta{box-shadow:0 2px 12px rgba(0,200,255,.3)}
[data-theme="crypto"] .bta:hover{box-shadow:0 4px 20px rgba(0,200,255,.5)}
:root{
  --acc:#e94560;--acc2:#0f3460;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;--amber:#f39c12;--purple:#9b59b6;--teal:#1abc9c;--pink:#e91e63;--cyan:#00bcd4;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Outfit',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* SHELL */
.shell{display:flex;min-height:100vh}
.sidebar{width:215px;background:var(--bg1);border-right:0.5px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:2px 0 20px rgba(0,0,0,.3)}
.main{flex:1;overflow-x:hidden;min-width:0}

/* SIDEBAR */
.logo{padding:18px 16px 14px;display:flex;align-items:center;gap:9px;border-bottom:0.5px solid var(--bdr)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),#c0392b);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 3px 10px rgba(233,69,96,.4)}
.logo-t{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.logo-s{font-size:9px;color:var(--t3)}
.ng{padding:10px 8px 3px}
.nl{font-size:8.5px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:1.2px;padding:0 10px;margin-bottom:3px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;color:var(--t3);font-size:12px;font-weight:400;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3);color:var(--t1);transform:translateX(2px)}
.ni.on{background:rgba(233,69,96,.1);color:var(--acc);font-weight:600;border-left:2px solid var(--acc);padding-left:8px}
.ni .ic{width:15px;height:15px;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nbadge{margin-left:auto;background:var(--acc);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:20px}

.tc-box{margin:auto 10px 12px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:9px 11px}
.tc-l{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.tc-row{display:flex;align-items:center;gap:5px}
.tc-inp{background:var(--bg3);border:0.5px solid var(--bdr);border-radius:4px;padding:4px 6px;font-size:11px;color:var(--t1);width:78px;font-family:'JetBrains Mono',monospace;text-align:right}
.tc-inp:focus{outline:none;border-color:var(--acc)}
.tc-eq{font-size:10px;color:var(--acc);margin-top:3px;font-family:'JetBrains Mono',monospace}

/* TOPBAR */
.topbar{background:var(--bg1);border-bottom:0.5px solid var(--bdr);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.tb-title{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.tb-actions{display:flex;gap:7px}

/* CONTENT */
.pad{padding:15px 18px}
.sec{display:none}.sec.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.met:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.ng{animation:slideIn .25s ease both}
.ng:nth-child(1){animation-delay:.05s}
.ng:nth-child(2){animation-delay:.1s}
.ng:nth-child(3){animation-delay:.15s}
.ng:nth-child(4){animation-delay:.2s}
.fi{animation:fi .25s ease both}

/* CARDS */
.card{background:var(--bg1);border:0.5px solid var(--bdr);border-radius:var(--r);padding:13px 15px;margin-bottom:11px}
.dp{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;box-shadow:0 2px 12px rgba(0,0,0,.15),0 0 0 0.5px rgba(255,255,255,.03) inset}
.ct{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* METRICS */
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.met{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:transform .15s,box-shadow .15s}
.ml{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.mv{font-size:19px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--blue)}.warn{color:var(--amber)}

/* GRID */
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:11px;margin-bottom:11px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:11px}
.g3c3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:11px}

/* GAUGE (medidor) */
.gauge-wrap{display:flex;justify-content:space-around;align-items:center;padding:6px 0 0}
.gauge-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.gauge-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.gauge-val{font-size:13px;font-weight:500;font-family:'JetBrains Mono',monospace}

/* CAT BARS */
.cbr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cbl{font-size:11px;color:var(--t2);width:80px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbt{flex:1;height:17px;background:var(--bg0);border-radius:3px;overflow:hidden}
.cbf{height:100%;border-radius:3px;transition:width .5s}
.cbv{font-size:10px;color:var(--t2);width:62px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}

/* ACC SUMMARY */
.asr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bdr)}
.asr:last-child{border-bottom:none}
.adot{width:8px;height:8px;border-radius:50%;margin-right:7px;flex-shrink:0}
.asn{font-size:12px;color:var(--t1)}
.asb{font-size:12px;font-weight:500;font-family:'JetBrains Mono',monospace}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 12px;font-size:8.5px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;border-bottom:0.5px solid var(--bdr)}
td{padding:9px 9px;border-bottom:0.5px solid var(--bdr);vertical-align:middle;color:var(--t2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.td{color:var(--t3);white-space:nowrap;font-size:10px}
.tdd{font-weight:500;color:var(--t1)}
.tdc{display:inline-flex;align-items:center;gap:4px}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tp{color:var(--green);font-weight:500;text-align:right;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tn{color:var(--red);font-weight:500;text-align:right;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tt{color:var(--cyan);font-weight:500;text-align:right;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.scr{max-height:250px;overflow-y:auto}

/* BADGES */
.bdg{display:inline-block;font-size:8.5px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.bg{background:rgba(46,204,113,.15);color:var(--green)}
.br{background:rgba(231,76,60,.15);color:var(--red)}
.bb{background:rgba(52,152,219,.15);color:var(--blue)}
.ba{background:rgba(243,156,18,.15);color:var(--amber)}
.bp{background:rgba(155,89,182,.15);color:var(--purple)}
.bc{background:rgba(0,188,212,.15);color:var(--cyan)}

/* ACC CARDS */
.ac{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.ac:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.2),0 0 0 1px var(--acc) inset}
.ac-top{position:absolute;top:0;left:0;right:0;height:3px}
.aic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:7px}
.an{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:1px}
.at{font-size:9px;color:var(--t3);margin-bottom:9px}
.ab{font-size:19px;font-weight:500;margin-bottom:5px;font-family:'JetBrains Mono',monospace}
.ae{font-size:9px;color:var(--t3);margin-bottom:7px}
.as2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.asl{font-size:9px;color:var(--t3)}
.asv{font-size:11px;font-weight:500;font-family:'JetBrains Mono',monospace}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid var(--bdr2);background:var(--bg3);color:var(--t1);font-family:'Outfit',sans-serif}
.btn:hover{background:var(--bg4)}
.bta{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 2px 12px rgba(233,69,96,.3)}.bta:hover{opacity:.92;box-shadow:0 4px 18px rgba(233,69,96,.4);transform:translateY(-1px)}
.bts{padding:4px 9px;font-size:11px}
.btg{background:transparent;border-color:transparent;color:var(--t3)}.btg:hover{color:var(--t1);background:var(--bg3)}

/* MODALS */
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:14px}
.mb.on{display:flex}
.mo{background:var(--bg1);border:0.5px solid var(--bdr2);border-radius:14px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;margin:auto;box-shadow:0 25px 60px rgba(0,0,0,.6),0 0 0 0.5px rgba(255,255,255,.04) inset}
.mot{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:14px}
.fg{margin-bottom:9px}
.fg label{display:block;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600}
.fg input,.fg select,.fg textarea{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:7px 10px;font-size:12px;color:var(--t1);width:100%;font-family:'Outfit',sans-serif;transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(233,69,96,.1)}
.fg select option{background:var(--bg2)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fend{display:flex;align-items:center;justify-content:flex-end;gap:7px;margin-top:13px}

/* LOAN ALERT */
.loan-alert{background:rgba(243,156,18,.08);border:0.5px solid rgba(243,156,18,.3);border-radius:var(--rs);padding:10px 13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:9px}
.loan-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.loan-title{font-size:12px;font-weight:500;color:var(--amber);margin-bottom:2px}
.loan-subt{font-size:11px;color:var(--t2);line-height:1.5}

/* GOAL */
.gi{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:11px 13px;margin-bottom:8px}
.gn{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:2px}
.gs{font-size:10px;color:var(--t3);margin-bottom:6px}
.pw{background:rgba(0,0,0,.3);border-radius:8px;height:8px;overflow:hidden;margin:4px 0}
.pf{height:100%;border-radius:8px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* BUDGET */
.bu-row{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:11px 13px;margin-bottom:8px}

/* AI */
.aib{padding:9px 12px;border-radius:9px;font-size:12px;line-height:1.7;margin-bottom:6px;max-width:85%}
.aiu{background:var(--acc2);color:var(--t1);margin-left:auto}
.aia{background:var(--bg2);border:0.5px solid var(--bdr);color:var(--t1)}
.aii{display:flex;gap:7px;background:var(--bg2);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:8px 11px;margin-bottom:6px;font-size:12px;line-height:1.6}

/* DONUT */
.dw{display:flex;align-items:center;gap:12px}
.li{display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:11px;color:var(--t2)}
.lsq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.lp{margin-left:auto;font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}

/* PERIOD TABS */
.ptabs{display:flex;gap:4px;margin-bottom:12px}
.ptab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid var(--bdr);background:var(--bg3);color:var(--t3);transition:all .18s;letter-spacing:.02em}
.ptab.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(52,152,219,.35)}

/* TREND % */
.trend-pos{color:var(--green);font-size:11px;font-weight:600}
.trend-neg{color:var(--red);font-size:11px;font-weight:600}

/* API */
.ep{background:var(--bg0);border:0.5px solid var(--bdr);border-radius:var(--rs);padding:8px 12px;margin-bottom:6px}
.em{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;margin-right:7px;font-family:'JetBrains Mono',monospace}
.eget{background:rgba(46,160,67,.2);color:#3fb950}
.epost{background:rgba(88,166,255,.2);color:#58a6ff}
.eput{background:rgba(210,153,34,.2);color:#d29922}
.edel{background:rgba(248,81,73,.2);color:#f85149}
.epath{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.edesc{font-size:10px;color:var(--t3);margin-top:2px}

.flex{display:flex;align-items:center;gap:7px}
.fsb{display:flex;align-items:center;justify-content:space-between}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(233,69,96,.3);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:680px){
  .sidebar{display:none}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .mets{grid-template-columns:1fr 1fr}
  .met{padding:10px 12px}
  .mv{font-size:16px}
  .pad{padding:10px 12px}
  .topbar{padding:9px 12px}
  .tb-title{font-size:14px}
  .fr{grid-template-columns:1fr}
  .mo{padding:16px;border-radius:10px;max-width:100%}
  .dw{flex-direction:column;align-items:flex-start}
  .main{padding-bottom:70px}
  #cat-grid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:681px){.mobile-nav{display:none}}
.mobile-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);border-top:0.5px solid var(--bdr);
  padding:8px 0 env(safe-area-inset-bottom,10px);z-index:50;
  justify-content:space-around;align-items:center;
  backdrop-filter:blur(10px);gap:4px;
}
.mob-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;color:var(--t3);
  font-size:9px;font-family:'Outfit',sans-serif;font-weight:600;
  padding:4px 8px;border-radius:8px;transition:all .15s;min-width:52px;
  letter-spacing:.03em;
}
.mob-btn.on{color:var(--acc)}
.mob-btn .mic{font-size:20px;line-height:1.2}
</style>
</head>
<body>
<div class="shell">

<!--- SIDEBAR --->
<nav class="sidebar">
  <div class="logo">
    <div class="logo-icon">F</div>
    <div><div class="logo-t">FinanzasAI</div><div class="logo-s">Pro Dashboard</div></div>
  </div>
  <div class="ng">
    <div class="nl">principal</div>
    <button class="ni on" onclick="nav('dash',this)"><span class="ic">⌘8</span>Dashboard</button>
    <button class="ni" onclick="nav('general',this)"><span class="ic">⌘9</span>Balance general</button>
    <button class="ni" onclick="nav('estadisticas',this)"><span class="ic">📊</span>Estadísticas</button>
    <button class="ni" onclick="nav('cuentas',this)"><span class="ic">⌘7</span>Cuentas</button>
    <button class="ni" onclick="nav('movimientos',this)"><span class="ic">↗</span>Movimientos</button>
  </div>
  <div class="ng">
    <div class="nl">planificación</div>
    <button class="ni" onclick="nav('prestamos',this)" id="nav-prest"><span class="ic">💰</span>Préstamos</button>
    <button class="ni" onclick="nav('metas',this)"><span class="ic">🎯</span>Metas</button>
    <button class="ni" onclick="nav('alertas',this)" id="nav-alert"><span class="ic">🔔</span>Presupuestos</button>
  </div>
  <div class="ng">
